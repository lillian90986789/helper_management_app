services:
  homeflow:
    build: .
    container_name: homeflow
    restart: unless-stopped
    ports:
      # 左边是 NAS 上对外暴露的端口，可按需修改，例如 "9000:8080"
      - "8080:8080"
    volumes:
      # SQLite 数据库持久化到 NAS 本地目录，容器重建数据不丢
      - ./data:/app/data
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      # 当地时区（新加坡）：影响"今日"判断与所有时间戳/日志显示
      - TZ=Asia/Singapore
      # 启用 Receipt 小票真实识别（Claude 视觉）：填入你自己的 Anthropic API Key。
      # 不配则走「模拟识别」演示。切勿把真实 Key 提交进 git —— 生产建议改为从 .env 注入。
      # - ANTHROPIC_API_KEY=sk-ant-你的key
